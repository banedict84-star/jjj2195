<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가죽 조합 시뮬레이터 · 크리스페 / 푸에블로 · 비니모 · 페니체</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --bg:#f3f5f8;
    --surface:#ffffff;
    --line:#eceef3;
    --line-soft:#f1f3f7;
    --ink:#1c2030;
    --ink-2:#5a6072;
    --ink-3:#9298a8;
    --primary:#7a5230;
    --primary-soft:#f3ece4;
    --radius:16px;
    --shadow-card: 0 1px 2px rgba(22,26,45,.04), 0 8px 28px rgba(22,26,45,.07);
    --shadow-float: 0 2px 6px rgba(22,26,45,.05), 0 18px 44px rgba(22,26,45,.12);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    font-family:"Pretendard Variable",Pretendard,-apple-system,system-ui,sans-serif;
    background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased; letter-spacing:-.01em;
    padding:28px 18px 60px;
  }
  .wrap{ max-width:1080px; margin:0 auto; }

  header.page{ margin-bottom:22px; }
  header.page h1{ font-size:24px; font-weight:800; letter-spacing:-.03em; display:flex; align-items:center; gap:10px; }
  header.page .leaf{ width:34px; height:34px; border-radius:10px; background:linear-gradient(140deg,#a9794a,#7a5230 70%); display:flex; align-items:center; justify-content:center; box-shadow:0 5px 14px rgba(122,82,48,.32); }
  header.page p{ color:var(--ink-2); font-size:14px; margin-top:8px; line-height:1.6; }

  .grid{ display:grid; grid-template-columns:1fr 420px; gap:20px; align-items:start; }
  @media (max-width:900px){ .grid{ grid-template-columns:1fr; } }

  .panel{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow-card); }
  .controls{ padding:6px 20px 18px; }

  .group{ padding:18px 0; border-bottom:1px solid var(--line-soft); }
  .group:last-child{ border-bottom:0; }
  .group h2{ font-size:13px; font-weight:700; letter-spacing:.02em; color:var(--ink-2); display:flex; align-items:center; gap:8px; margin-bottom:4px; text-transform:uppercase; }
  .group h2 .ko{ font-size:15px; font-weight:800; color:var(--ink); text-transform:none; letter-spacing:-.02em; }
  .group .pick{ font-size:13px; color:var(--ink-3); margin-bottom:13px; }
  .group .pick b{ color:var(--primary); font-weight:700; }

  /* sub-tabs (leather brand) */
  .tabs{ display:inline-flex; background:var(--line-soft); border-radius:11px; padding:4px; gap:4px; margin-bottom:14px; }
  .tabs button{ border:0; background:transparent; font:inherit; font-size:13px; font-weight:700; color:var(--ink-2); padding:7px 16px; border-radius:8px; cursor:pointer; transition:all .15s; }
  .tabs button.on{ background:var(--surface); color:var(--ink); box-shadow:0 1px 3px rgba(22,26,45,.12); }

  .swatches{ display:flex; flex-wrap:wrap; gap:11px; }
  .sw{ cursor:pointer; width:60px; text-align:center; }
  .sw .chip{ width:48px; height:48px; margin:0 auto 6px; border-radius:12px; border:1px solid rgba(0,0,0,.08); box-shadow:inset 0 -6px 12px rgba(0,0,0,.12), 0 2px 5px rgba(0,0,0,.08); position:relative; transition:transform .14s; }
  .sw .chip::after{ content:""; position:absolute; inset:0; border-radius:12px; box-shadow:0 0 0 0 transparent; transition:box-shadow .15s; }
  .sw:hover .chip{ transform:translateY(-2px); }
  .sw.on .chip::after{ box-shadow:0 0 0 3px var(--surface), 0 0 0 5px var(--primary); }
  .sw .nm{ font-size:11px; line-height:1.3; color:var(--ink-2); font-weight:600; }
  .sw .sub{ font-size:10px; color:var(--ink-3); }
  /* thread chips = round, like spools */
  .sw.thread .chip{ border-radius:50%; }
  .sw.thread .chip::after{ border-radius:50%; }
  .sw.thread.on .chip::after{ box-shadow:0 0 0 3px var(--surface), 0 0 0 5px var(--primary); }

  /* preview */
  .preview{ position:sticky; top:20px; }
  .preview .stage{ padding:24px; }
  .preview svg{ width:100%; height:auto; display:block; border-radius:12px; }
  .summary{ border-top:1px solid var(--line-soft); padding:16px 20px 18px; }
  .summary .row{ display:flex; align-items:center; gap:11px; padding:7px 0; }
  .summary .dot{ width:22px; height:22px; border-radius:7px; border:1px solid rgba(0,0,0,.1); flex-shrink:0; box-shadow:inset 0 -3px 6px rgba(0,0,0,.12); }
  .summary .dot.round{ border-radius:50%; }
  .summary .lbl{ font-size:12px; color:var(--ink-3); width:64px; flex-shrink:0; }
  .summary .val{ font-size:14px; font-weight:700; }
  .summary .val small{ font-weight:500; color:var(--ink-3); margin-left:5px; }

  .note{ font-size:11.5px; color:var(--ink-3); line-height:1.6; margin-top:16px; padding:12px 14px; background:var(--line-soft); border-radius:10px; }

  .actions{ display:flex; gap:8px; margin-top:14px; }
  .btn{ flex:1; border:1px solid var(--line); background:var(--surface); font:inherit; font-size:13px; font-weight:700; color:var(--ink-2); padding:10px; border-radius:10px; cursor:pointer; transition:all .14s; }
  .btn:hover{ background:var(--line-soft); color:var(--ink); }
  .btn.primary{ background:var(--primary); color:#fff; border-color:var(--primary); }
  .btn.primary:hover{ filter:brightness(1.06); color:#fff; }
  .toast{ position:fixed; left:50%; bottom:32px; transform:translateX(-50%) translateY(20px); background:var(--ink); color:#fff; font-size:13px; font-weight:600; padding:11px 18px; border-radius:11px; box-shadow:var(--shadow-float); opacity:0; pointer-events:none; transition:all .25s; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="wrap">
  <header class="page">
    <h1>
      <span class="leaf">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 18c8 2 14-3 16-14C10 2 4 8 4 18Z" fill="#fff" opacity=".92"/><path d="M5 17C9 12 14 8 18 6" stroke="#7a5230" stroke-width="1.5" stroke-linecap="round"/></svg>
      </span>
      가죽 조합 시뮬레이터
    </h1>
    <p>가죽 · 실 · 엣지코트 색상을 골라 조합을 미리 확인해 보세요. 실은 <b>비니모</b>, 엣지코트는 <b>페니체</b> 색상을 기준으로 합니다.</p>
  </header>

  <div class="grid">
    <!-- 컨트롤 -->
    <div class="panel controls">

      <div class="group">
        <h2>LEATHER <span class="ko">가죽</span></h2>
        <div class="pick">선택: <b id="pick-leather">—</b></div>
        <div class="tabs" id="leather-tabs">
          <button data-brand="crispe" class="on">가죽 1</button>
          <button data-brand="pueblo">가죽 2</button>
        </div>
        <div class="swatches" id="leather-sw"></div>
      </div>

      <div class="group">
        <h2>THREAD <span class="ko">실 · 비니모</span></h2>
        <div class="pick">선택: <b id="pick-thread">—</b></div>
        <div class="swatches" id="thread-sw"></div>
      </div>

      <div class="group">
        <h2>EDGE COAT <span class="ko">엣지코트 · 페니체</span></h2>
        <div class="pick">선택: <b id="pick-edge">—</b></div>
        <div class="swatches" id="edge-sw"></div>
      </div>

    </div>

    <!-- 미리보기 -->
    <div class="preview">
      <div class="panel">
        <div class="stage">
          <svg id="preview-svg" viewBox="0 0 360 300" xmlns="http://www.w3.org/2000/svg"
               aria-label="가죽 카드지갑 미리보기"
               style="--leather:#8a5a32; --edge:#222; --thread:#efe9df;">
            <defs>
              <!-- ===== 가죽 그레인(결) + 조명 : 실사 질감 ===== -->
              <filter id="leatherFx" x="-5%" y="-5%" width="110%" height="110%">
                <feTurbulence id="leatherTurb" type="fractalNoise" baseFrequency="0.7 0.7"
                              numOctaves="3" seed="14" stitchTiles="stitch" result="noise"/>
                <feDiffuseLighting id="leatherLight" in="noise" surfaceScale="1.1"
                                   diffuseConstant="1.15" lighting-color="#fff" result="emboss">
                  <feDistantLight azimuth="235" elevation="58"/>
                </feDiffuseLighting>
                <!-- 그레인 명암을 본체 색에 곱하기(발색은 최대한 보존) -->
                <feComposite in="emboss" in2="SourceGraphic" operator="arithmetic"
                             k1="1.34" k2="0" k3="0" k4="-0.05" result="lit"/>
                <feComposite in="lit" in2="SourceGraphic" operator="in"/>
              </filter>

              <!-- 부드러운 풀업 하이라이트(가운데 밝게) -->
              <radialGradient id="pullup" cx="42%" cy="34%" r="72%">
                <stop offset="0%"  stop-color="#fff" stop-opacity=".22"/>
                <stop offset="48%" stop-color="#fff" stop-opacity=".04"/>
                <stop offset="100%" stop-color="#000" stop-opacity=".15"/>
              </radialGradient>
              <!-- 엣지 광택(위 밝고 아래 어둡게) -->
              <linearGradient id="edgeGloss" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%"   stop-color="#fff" stop-opacity=".40"/>
                <stop offset="35%"  stop-color="#fff" stop-opacity="0"/>
                <stop offset="100%" stop-color="#000" stop-opacity=".40"/>
              </linearGradient>
              <!-- 카드 -->
              <linearGradient id="cardg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%"   stop-color="#fbfcfe"/>
                <stop offset="55%"  stop-color="#e8ebf1"/>
                <stop offset="100%" stop-color="#cdd3de"/>
              </linearGradient>
              <linearGradient id="chipg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#f3d684"/>
                <stop offset="100%" stop-color="#be9636"/>
              </linearGradient>
              <filter id="drop" x="-35%" y="-30%" width="170%" height="185%">
                <feDropShadow dx="0" dy="13" stdDeviation="13" flood-color="#10131f" flood-opacity="0.26"/>
              </filter>
              <!-- 스티치 음각(실이 박힌 구멍 그림자) -->
              <filter id="stitchShadow" x="-60%" y="-60%" width="220%" height="220%">
                <feDropShadow dx="0" dy="0.7" stdDeviation="0.7" flood-color="#000" flood-opacity="0.55"/>
              </filter>
            </defs>

            <!-- ===== 카드지갑 ===== -->
            <g filter="url(#drop)">

              <!-- 뒷판(가죽 본체) -->
              <rect x="56" y="70" width="248" height="178" rx="15" fill="var(--leather)" filter="url(#leatherFx)"/>
              <rect x="56" y="70" width="248" height="178" rx="15" fill="url(#pullup)"/>

              <!-- 포켓 안쪽 음영(입구 위쪽) -->
              <rect x="64" y="78" width="232" height="56" rx="8" fill="#000" opacity=".12"/>

              <!-- 앞 포켓(가죽) : 위는 직선 컷, 아래는 본체 곡률 -->
              <path d="M56 132 L304 132 L304 233 Q304 248 289 248 L71 248 Q56 248 56 233 Z"
                    fill="var(--leather)" filter="url(#leatherFx)"/>
              <path d="M56 132 L304 132 L304 233 Q304 248 289 248 L71 248 Q56 248 56 233 Z"
                    fill="url(#pullup)"/>

              <!-- ===== 엣지코트(도색된 컷면) ===== -->
              <!-- 포켓 입구: 도색 + 광택 -->
              <line x1="57" y1="132" x2="303" y2="132" stroke="var(--edge)" stroke-width="7" stroke-linecap="round"/>
              <line x1="57" y1="130.4" x2="303" y2="130.4" stroke="#fff" stroke-width="1.1" stroke-linecap="round" opacity=".35"/>
              <line x1="57" y1="134.4" x2="303" y2="134.4" stroke="#000" stroke-width="1.4" stroke-linecap="round" opacity=".30"/>
              <!-- 바깥 둘레: 도색 + 광택(위/아래) -->
              <rect x="56" y="70" width="248" height="178" rx="15" fill="none" stroke="var(--edge)" stroke-width="8"/>
              <rect x="56" y="70" width="248" height="178" rx="15" fill="none" stroke="url(#edgeGloss)" stroke-width="8"/>

              <!-- ===== 새들 스티치(실) : JS로 생성 ===== -->
              <g id="stitches" filter="url(#stitchShadow)"></g>
            </g>
          </svg>
        </div>
        <div class="summary">
          <div class="row">
            <span class="dot" id="sum-leather-dot"></span>
            <span class="lbl">가죽</span>
            <span class="val" id="sum-leather">—</span>
          </div>
          <div class="row">
            <span class="dot round" id="sum-thread-dot"></span>
            <span class="lbl">실</span>
            <span class="val" id="sum-thread">—</span>
          </div>
          <div class="row">
            <span class="dot" id="sum-edge-dot"></span>
            <span class="lbl">엣지코트</span>
            <span class="val" id="sum-edge">—</span>
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="btn" id="btn-random">🎲 랜덤 조합</button>
        <button class="btn primary" id="btn-copy">조합 복사</button>
      </div>

      <p class="note">※ 실은 <b>비니모 색번</b>, 엣지코트는 <b>페니체 코드</b> 기준입니다. 화면 색상은 색상표를 참고한 근사값으로 실제 색감과 차이가 있을 수 있으니(모니터·무두질 편차·도색 두께) 참고용으로만 활용하세요.</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   색상 데이터  (HEX는 실제 색감에 근접한 참고용 값)
   ============================================================ */
const LEATHER = {
  crispe: {
    label:"크리스페",
    colors:[
      {name:"내추럴",  hex:"#d8b483"},
      {name:"카멜",    hex:"#b07b41"},
      {name:"브라운",  hex:"#7c4f2c"},
      {name:"초코",    hex:"#4f3220"},
      {name:"블랙",    hex:"#262321"},
      {name:"레드",    hex:"#8e2f2a"},
      {name:"오렌지",  hex:"#c5662a"},
      {name:"옐로우",  hex:"#d9a531"},
      {name:"그린",    hex:"#465c3b"},
      {name:"네이비",  hex:"#2c3a55"},
    ],
  },
  /* 푸에블로(Badalassi Carlo Pueblo) — 빈티지 무광 톤 */
  pueblo: {
    label:"푸에블로",
    colors:[
      {name:"라떼",        sub:"Latte",      hex:"#cdb088"},
      {name:"타바코",      sub:"Tabacco",    hex:"#9a6a3a"},
      {name:"올모",        sub:"Olmo",       hex:"#8a7647"},
      {name:"카스타냐",    sub:"Castagna",   hex:"#7c4d2c"},
      {name:"치오콜라또",  sub:"Cioccolato", hex:"#46301f"},
      {name:"네로",        sub:"Nero",       hex:"#221f1a"},
      {name:"치리에지아",  sub:"Ciliegia",   hex:"#7e2e2c"},
      {name:"아란치오",    sub:"Arancio",    hex:"#bd5a28"},
      {name:"세나페",      sub:"Senape",     hex:"#b5862c"},
      {name:"베르데",      sub:"Verde",      hex:"#3f5440"},
      {name:"코발토",      sub:"Cobalto",    hex:"#2f4a6b"},
      {name:"아메티스타",  sub:"Ametista",   hex:"#4f3a52"},
      {name:"그리지오",    sub:"Grigio",     hex:"#6f6a60"},
      {name:"루지네",      sub:"Ruggine",    hex:"#9a4a2a"},
    ],
  },
};

/* 비니모(Vinymo MBT) — 색상표 색번(흰색·생성·검정 + 4~40) · 색상은 근사값 */
const THREAD = [
  {name:"흰색",   hex:"#f4f1ea"}, {name:"생성", hex:"#e7ddc6"}, {name:"검정", hex:"#201e1d"},
  {name:"4",  hex:"#cdd2d6"}, {name:"5",  hex:"#98a2aa"}, {name:"6",  hex:"#f0c9d2"},
  {name:"7",  hex:"#e59aab"}, {name:"8",  hex:"#d97068"}, {name:"9",  hex:"#c0392f"},
  {name:"10", hex:"#9e2b25"}, {name:"11", hex:"#6e2a2c"}, {name:"12", hex:"#e7d2a8"},
  {name:"13", hex:"#d2b483"}, {name:"14", hex:"#c2954f"}, {name:"15", hex:"#a9743f"},
  {name:"16", hex:"#8a5a32"}, {name:"17", hex:"#6f4a2c"}, {name:"18", hex:"#553720"},
  {name:"19", hex:"#3f2a1c"}, {name:"20", hex:"#2c241d"}, {name:"21", hex:"#d9b15a"},
  {name:"22", hex:"#e2c044"}, {name:"23", hex:"#d77a2c"}, {name:"24", hex:"#8fae5d"},
  {name:"25", hex:"#4f7d44"}, {name:"26", hex:"#2f6b54"}, {name:"27", hex:"#274536"},
  {name:"28", hex:"#6f7468"}, {name:"29", hex:"#8c8c86"}, {name:"30", hex:"#b6b4ac"},
  {name:"31", hex:"#9a8d76"}, {name:"32", hex:"#cabfa9"}, {name:"33", hex:"#7d756a"},
  {name:"34", hex:"#d8c9b0"}, {name:"35", hex:"#ece4d4"}, {name:"36", hex:"#efe9dd"},
  {name:"37", hex:"#6f9ec9"}, {name:"38", hex:"#2f6fb0"}, {name:"39", hex:"#28406a"},
  {name:"40", hex:"#1f2d4a"},
];

/* 페니체(Fenice) 엣지코트 — 색상표 코드 · 색상은 근사값 */
const EDGE = [
  {name:"501",  sub:"그레이지", hex:"#d9d4c6"}, {name:"502", sub:"아이보리", hex:"#e8e0cf"},
  {name:"1230", sub:"이토프 라이트", hex:"#8f8474"}, {name:"126", sub:"이토프 다크", hex:"#5f574a"},
  {name:"1078", sub:"카라멜", hex:"#b07b45"}, {name:"6467", sub:"브라운", hex:"#8a5a30"},
  {name:"596",  sub:"브라운", hex:"#7a4f2c"}, {name:"597", sub:"브라운", hex:"#6b4527"},
  {name:"600",  sub:"다크초코", hex:"#4a2f1d"}, {name:"6477", sub:"다크브라운", hex:"#3e291b"},
  {name:"50",   sub:"블랙브라운", hex:"#2f2019"}, {name:"611", sub:"다크", hex:"#33241a"},
  {name:"6476", sub:"블랙브라운", hex:"#281b14"}, {name:"2266", sub:"오렌지레드", hex:"#c0492a"},
  {name:"1204", sub:"오렌지", hex:"#cf6f2a"}, {name:"539", sub:"앰버", hex:"#c98a3e"},
  {name:"6471", sub:"레드", hex:"#9e2722"}, {name:"544", sub:"다크레드", hex:"#5f2026"},
  {name:"144",  sub:"라이트블루", hex:"#7fa6c8"}, {name:"233", sub:"블루", hex:"#3f6fae"},
  {name:"819",  sub:"인디고", hex:"#2c3f74"}, {name:"625", sub:"다크그린", hex:"#234b34"},
  {name:"636",  sub:"그린", hex:"#3a6b46"}, {name:"6453", sub:"딥그린", hex:"#1f3d2c"},
  {name:"647",  sub:"슬레이트", hex:"#5d6f7a"}, {name:"661", sub:"블루", hex:"#2f63a8"},
  {name:"652",  sub:"네이비", hex:"#283b63"}, {name:"1234", sub:"다크네이비", hex:"#1f2c4a"},
  {name:"6485", sub:"블랙네이비", hex:"#161d2e"}, {name:"666", sub:"보르도", hex:"#5e2330"},
  {name:"671",  sub:"그레이", hex:"#8d8b85"}, {name:"6499", sub:"무광 블랙", hex:"#1c1a18"},
  {name:"6369", sub:"유광 블랙", hex:"#161412"}, {name:"6451", sub:"화이트", hex:"#f0ece2"},
  {name:"6455", sub:"옐로우", hex:"#e0b330"}, {name:"1116", sub:"레드브라운", hex:"#6e3a2a"},
  {name:"2501", sub:"형광 옐로우", hex:"#d8e84a"}, {name:"2503", sub:"형광 오렌지", hex:"#f06a2a"},
  {name:"2505", sub:"형광 블루", hex:"#2aa0e8"}, {name:"2510", sub:"형광 핑크", hex:"#e8479a"},
  {name:"HS5799", sub:"베이스 블랙", hex:"#14110f"},
];

/* ============================================================
   상태
   ============================================================ */
const state = { brand:"crispe", leatherIdx:1, threadIdx:1, edgeIdx:5 };

/* ============================================================
   렌더링 헬퍼
   ============================================================ */
function makeSwatch(item, sub, kind, selected, onClick){
  const el = document.createElement("div");
  el.className = "sw" + (kind==="thread" ? " thread":"") + (selected ? " on":"");
  el.innerHTML = `<div class="chip" style="background:${item.hex}"></div>
                  <div class="nm">${item.name}</div>` + (sub?`<div class="sub">${sub}</div>`:"");
  el.addEventListener("click", onClick);
  return el;
}

function renderLeather(){
  const tabsWrap = document.getElementById("leather-tabs");
  [...tabsWrap.children].forEach(b => b.classList.toggle("on", b.dataset.brand===state.brand));
  const wrap = document.getElementById("leather-sw");
  wrap.innerHTML = "";
  LEATHER[state.brand].colors.forEach((c,i)=>{
    wrap.appendChild(makeSwatch(c, c.sub||null, "leather", i===state.leatherIdx, ()=>{ state.leatherIdx=i; update(); }));
  });
}
function renderThread(){
  const wrap = document.getElementById("thread-sw");
  wrap.innerHTML = "";
  THREAD.forEach((c,i)=>{
    wrap.appendChild(makeSwatch(c, null, "thread", i===state.threadIdx, ()=>{ state.threadIdx=i; update(); }));
  });
}
function renderEdge(){
  const wrap = document.getElementById("edge-sw");
  wrap.innerHTML = "";
  EDGE.forEach((c,i)=>{
    wrap.appendChild(makeSwatch(c, c.sub||null, "edge", i===state.edgeIdx, ()=>{ state.edgeIdx=i; update(); }));
  });
}

function current(){
  const brand = LEATHER[state.brand];
  return {
    leather: brand.colors[state.leatherIdx],
    brandLabel: brand.label,
    thread: THREAD[state.threadIdx],
    edge: EDGE[state.edgeIdx],
  };
}

/* ============================================================
   새들 스티치 생성 — 사선으로 박힌 실땀을 사실적으로 그림
   ============================================================ */
const SVGNS = "http://www.w3.org/2000/svg";
const STITCH_TILT = 38;   // 실밥 기울기(솔기 방향 기준 +38°): 윗변에서 왼쪽위→오른쪽아래(＼)
function stitchAlong(x1,y1,x2,y2,gap){
  const out=[]; const dx=x2-x1, dy=y2-y1, len=Math.hypot(dx,dy);
  const ux=dx/len, uy=dy/len;
  const ang=Math.atan2(dy,dx)*180/Math.PI;
  const n=Math.max(1,Math.round(len/gap)); const step=len/n;
  for(let i=0;i<=n;i++){ out.push({x:x1+ux*step*i, y:y1+uy*step*i, a:ang}); }
  return out;
}
/* 둥근 사각형 경로를 따라 균등 간격 + 각 점의 진행 방향(접선) 산출 → 끊김/겹침 없이 모서리까지 이어짐 */
function stitchRoundRect(x,y,w,h,r,gap){
  const svg=document.getElementById("preview-svg");
  const tmp=document.createElementNS(SVGNS,"path");
  tmp.setAttribute("d",
    `M${x+r} ${y} H${x+w-r} A${r} ${r} 0 0 1 ${x+w} ${y+r} `+
    `V${y+h-r} A${r} ${r} 0 0 1 ${x+w-r} ${y+h} `+
    `H${x+r} A${r} ${r} 0 0 1 ${x} ${y+h-r} `+
    `V${y+r} A${r} ${r} 0 0 1 ${x+r} ${y} Z`);
  svg.appendChild(tmp);
  const total=tmp.getTotalLength();
  const n=Math.max(8,Math.round(total/gap)); const step=total/n;
  const out=[];
  for(let i=0;i<n;i++){
    const len=i*step;
    const p=tmp.getPointAtLength(len);
    const p2=tmp.getPointAtLength((len+1.5)%total);
    const a=Math.atan2(p2.y-p.y, p2.x-p.x)*180/Math.PI;  // 진행 접선각
    out.push({x:p.x, y:p.y, a});
  }
  svg.removeChild(tmp);
  return out;
}
function buildStitches(){
  const g=document.getElementById("stitches"); g.innerHTML="";
  const gap=9.8;
  const seams=[
    ...stitchRoundRect(68,82,224,154,9,gap),  // 바깥 둘레(접선 따라 균등 → 끊김 없음)
    ...stitchAlong(90,142,270,142,gap),       // 포켓 입구
  ];
  const L=10.5, W=3.3;   // 실밥 길이/두께 (가로로 그린 뒤 회전)
  seams.forEach(s=>{
    const grp=document.createElementNS(SVGNS,"g");
    grp.setAttribute("transform",`translate(${s.x.toFixed(1)} ${s.y.toFixed(1)}) rotate(${(s.a+STITCH_TILT).toFixed(1)})`);
    const body=document.createElementNS(SVGNS,"rect");   // 가로 막대 → 회전 시 ＼ 방향
    body.setAttribute("x",(-L/2).toFixed(2)); body.setAttribute("y",(-W/2).toFixed(2));
    body.setAttribute("width",L); body.setAttribute("height",W);
    body.setAttribute("rx",(W/2).toFixed(2)); body.setAttribute("fill","var(--thread)");
    const sheen=document.createElementNS(SVGNS,"rect");   // 실 꼬임 광택(윗면)
    sheen.setAttribute("x",(-L/2+1).toFixed(2)); sheen.setAttribute("y",(-W/2+0.4).toFixed(2));
    sheen.setAttribute("width",(L-2).toFixed(2)); sheen.setAttribute("height",(W*0.34).toFixed(2));
    sheen.setAttribute("rx",(W*0.17).toFixed(2)); sheen.setAttribute("fill","#fff"); sheen.setAttribute("opacity",".30");
    grp.appendChild(body); grp.appendChild(sheen); g.appendChild(grp);
  });
}

/* 브랜드별 가죽 결: 크리스페=곱고 매끈 / 푸에블로=거친 풀업 */
function applyGrain(){
  const t=document.getElementById("leatherTurb");
  const l=document.getElementById("leatherLight");
  if(state.brand==="pueblo"){
    // 푸에블로: 솔질한 듯 얼룩진 풀업 — 큰 구름결 + 약한 미세결
    t.setAttribute("baseFrequency","0.04 0.08"); t.setAttribute("numOctaves","5");
    l.setAttribute("surfaceScale","1.7");
  }else{
    // 크리스페: 곱고 매끈한 풀그레인 — 미세 모공
    t.setAttribute("baseFrequency","0.95 1.0"); t.setAttribute("numOctaves","2");
    l.setAttribute("surfaceScale","0.7");
  }
}

function update(){
  renderLeather(); renderThread(); renderEdge();
  const c = current();

  // 미리보기 SVG (가죽/실/엣지코트 색을 CSS 변수로 일괄 반영)
  const svg = document.getElementById("preview-svg");
  svg.style.setProperty("--leather", c.leather.hex);
  svg.style.setProperty("--thread", c.thread.hex);
  svg.style.setProperty("--edge", c.edge.hex);
  applyGrain();

  // 선택 표시
  const lsub = c.leather.sub ? ` (${c.leather.sub})` : "";
  const esub = c.edge.sub ? ` ${c.edge.sub}` : "";
  document.getElementById("pick-leather").textContent = `${c.leather.name}${lsub}`;
  document.getElementById("pick-thread").textContent  = `비니모 ${c.thread.name}`;
  document.getElementById("pick-edge").textContent    = `페니체 ${c.edge.name}${esub}`;

  // 요약
  document.getElementById("sum-leather").innerHTML = `${c.leather.name}${lsub} <small>가죽</small>`;
  document.getElementById("sum-thread").innerHTML  = `비니모 ${c.thread.name} <small>실</small>`;
  document.getElementById("sum-edge").innerHTML    = `${c.edge.name}${c.edge.sub?` `+c.edge.sub:""} <small>페니체</small>`;
  document.getElementById("sum-leather-dot").style.background = c.leather.hex;
  document.getElementById("sum-thread-dot").style.background  = c.thread.hex;
  document.getElementById("sum-edge-dot").style.background    = c.edge.hex;
}

/* 브랜드 탭 */
document.getElementById("leather-tabs").addEventListener("click", e=>{
  const b = e.target.closest("button"); if(!b) return;
  if(state.brand===b.dataset.brand) return;
  state.brand = b.dataset.brand;
  state.leatherIdx = Math.min(state.leatherIdx, LEATHER[state.brand].colors.length-1);
  update();
});

/* 랜덤 */
const rnd = n => Math.floor(Math.random()*n);
document.getElementById("btn-random").addEventListener("click", ()=>{
  state.brand = Math.random()<0.5 ? "crispe":"pueblo";
  state.leatherIdx = rnd(LEATHER[state.brand].colors.length);
  state.threadIdx = rnd(THREAD.length);
  state.edgeIdx = rnd(EDGE.length);
  update();
});

/* 복사 */
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove("show"), 1800);
}
document.getElementById("btn-copy").addEventListener("click", ()=>{
  const c = current();
  const txt = `가죽: ${c.leather.name}${c.leather.sub?`(${c.leather.sub})`:""} / 실: 비니모 ${c.thread.name} / 엣지코트: 페니체 ${c.edge.name}${c.edge.sub?` ${c.edge.sub}`:""}`;
  (navigator.clipboard?.writeText(txt) ?? Promise.reject())
    .then(()=>toast("조합을 복사했어요 ✓"))
    .catch(()=>toast(txt));
});

buildStitches();
update();
</script>
</body>
</html>
