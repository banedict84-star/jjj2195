<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 · SMM 패널</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth">
      <div class="brand" style="margin-bottom:16px"><span class="dot"></span> SMM 패널</div>
      <h1 id="title">로그인</h1>
      <p class="sub" id="subtitle">계정으로 로그인하고 주문을 시작하세요.</p>

      <div class="tabs">
        <button id="tab-login" class="active" onclick="switchTab('login')">로그인</button>
        <button id="tab-signup" onclick="switchTab('signup')">회원가입</button>
      </div>

      <label>이메일</label>
      <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
      <label>비밀번호</label>
      <input id="password" type="password" placeholder="6자 이상" autocomplete="current-password" />

      <button class="btn" id="submitBtn" onclick="submit()">로그인</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-functions-compat.js"></script>
  <script src="app.js"></script>
  <script>
    let mode = "login";

    // 이미 로그인되어 있으면 패널로
    auth.onAuthStateChanged((user) => {
      if (user) location.href = "panel.html";
    });

    function switchTab(m) {
      mode = m;
      document.getElementById("tab-login").classList.toggle("active", m === "login");
      document.getElementById("tab-signup").classList.toggle("active", m === "signup");
      document.getElementById("title").textContent = m === "login" ? "로그인" : "회원가입";
      document.getElementById("subtitle").textContent =
        m === "login" ? "계정으로 로그인하고 주문을 시작하세요." : "새 계정을 만들어 시작하세요.";
      document.getElementById("submitBtn").textContent = m === "login" ? "로그인" : "회원가입";
      msg("");
    }

    function msg(t, ok) {
      const el = document.getElementById("msg");
      el.textContent = t;
      el.className = "msg " + (ok ? "ok" : "err");
    }

    async function submit() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const btn = document.getElementById("submitBtn");
      if (!email || !password) return msg("이메일과 비밀번호를 입력하세요.");
      btn.disabled = true;
      try {
        if (mode === "signup") {
          await auth.createUserWithEmailAndPassword(email, password);
        } else {
          await auth.signInWithEmailAndPassword(email, password);
        }
        // users 문서 생성/확인 후 이동
        await call("smmEnsureUser");
        location.href = "panel.html";
      } catch (e) {
        msg(translateAuthError(e));
        btn.disabled = false;
      }
    }

    function translateAuthError(e) {
      const c = (e && e.code) || "";
      if (c.includes("email-already-in-use")) return "이미 가입된 이메일입니다.";
      if (c.includes("invalid-email")) return "이메일 형식이 올바르지 않습니다.";
      if (c.includes("weak-password")) return "비밀번호는 6자 이상이어야 합니다.";
      if (c.includes("wrong-password") || c.includes("invalid-credential")) return "이메일 또는 비밀번호가 올바르지 않습니다.";
      if (c.includes("user-not-found")) return "등록되지 않은 계정입니다.";
      if (c.includes("too-many-requests")) return "시도가 너무 많습니다. 잠시 후 다시 시도하세요.";
      return e.message || "오류가 발생했습니다.";
    }

    // Enter 키 제출
    document.addEventListener("keydown", (e) => { if (e.key === "Enter") submit(); });
  </script>
</body>
</html>
