<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 · SMM 패널</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="topbar">
    <div class="brand"><span class="dot"></span> SMM 패널 · 관리자</div>
    <div class="nav">
      <a href="panel.html">패널로</a>
      <a href="#" onclick="logout();return false;">로그아웃</a>
    </div>
  </div>

  <div class="container">
    <div class="grid cols-3">
      <div class="card stat">
        <div class="k">공급처(SMMKings) 잔액</div>
        <div class="v" id="providerBal">—</div>
        <button class="btn ghost sm" style="margin-top:12px" onclick="loadProviderBalance()">조회</button>
      </div>

      <div class="card">
        <h2>마진 설정</h2>
        <label>마진 (%)</label>
        <input id="markup" type="number" min="0" step="1" placeholder="예: 20" />
        <button class="btn" onclick="saveMarkup()">저장</button>
        <div class="msg" id="markupMsg"></div>
      </div>

      <div class="card">
        <h2>고객 잔액 충전</h2>
        <label>고객 이메일</label>
        <input id="custEmail" type="email" placeholder="user@example.com" />
        <label>금액 (USD, 차감은 음수)</label>
        <input id="amount" type="number" step="0.01" placeholder="예: 10" />
        <button class="btn" onclick="adjustBalance()">적용</button>
        <div class="msg" id="adjustMsg"></div>
      </div>
    </div>

    <div class="card" style="margin-top:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <h2 style="margin:0">전체 주문</h2>
        <button class="btn ghost sm" onclick="loadOrders()">새로고침</button>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr><th>주문일</th><th>고객</th><th>서비스</th><th>수량</th><th>금액</th><th>공급처#</th><th>상태</th></tr>
          </thead>
          <tbody id="orders"><tr><td colspan="7" class="muted">불러오는 중...</td></tr></tbody>
        </table>
      </div>
    </div>
    <div class="msg err" id="guard"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-functions-compat.js"></script>
  <script src="app.js"></script>
  <script>
    async function init() {
      await requireLogin();
      // 관리자 여부 확인
      try {
        const me = await call("smmMe");
        if (me.role !== "admin") {
          document.querySelector(".container").innerHTML =
            '<div class="card msg err">관리자 권한이 없습니다. <a href="panel.html">패널로 돌아가기</a></div>';
          return;
        }
      } catch (e) {
        document.getElementById("guard").textContent = e.message;
        return;
      }
      loadOrders();
      loadProviderBalance();
    }

    async function loadProviderBalance() {
      const el = document.getElementById("providerBal");
      el.textContent = "...";
      try {
        const b = await call("smmProviderBalance");
        el.textContent = (b.currency || "$") + " " + (b.balance != null ? b.balance : JSON.stringify(b));
      } catch (e) { el.textContent = "오류"; }
    }

    async function saveMarkup() {
      const m = document.getElementById("markupMsg");
      const pct = parseFloat(document.getElementById("markup").value);
      try {
        const r = await call("smmSetMarkup", { markupPercent: pct });
        m.textContent = `저장됨: 마진 ${r.markupPercent}%`; m.className = "msg ok";
      } catch (e) { m.textContent = e.message; m.className = "msg err"; }
    }

    async function adjustBalance() {
      const m = document.getElementById("adjustMsg");
      const email = document.getElementById("custEmail").value.trim();
      const amount = parseFloat(document.getElementById("amount").value);
      try {
        const r = await call("smmAdjustBalance", { email, amount });
        m.textContent = `완료: ${r.email} 잔액 $${fmt(r.balance)}`; m.className = "msg ok";
        document.getElementById("amount").value = "";
      } catch (e) { m.textContent = e.message; m.className = "msg err"; }
    }

    async function loadOrders() {
      const tb = document.getElementById("orders");
      try {
        const orders = await call("smmAllOrders");
        if (!orders.length) { tb.innerHTML = '<tr><td colspan="7" class="muted">주문이 없습니다.</td></tr>'; return; }
        tb.innerHTML = orders.map((o) => `
          <tr>
            <td>${new Date(o.createdAt).toLocaleDateString("ko-KR")}</td>
            <td>${esc(o.uid).slice(0, 8)}</td>
            <td>${esc(o.serviceName || o.service)}</td>
            <td>${esc(o.quantity)}</td>
            <td>$${fmt(o.charge)}</td>
            <td>#${esc(o.providerOrder)}</td>
            <td><span class="badge ${statusClass(o.status)}">${esc(o.status)}</span></td>
          </tr>`).join("");
      } catch (e) {
        tb.innerHTML = `<tr><td colspan="7" class="msg err">${esc(e.message)}</td></tr>`;
      }
    }

    init();
  </script>
</body>
</html>
