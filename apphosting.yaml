# Firebase App Hosting 런타임 설정
# 문서: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # 의원실 내부용 트래픽 규모 — 비용 절감을 위해 최대 인스턴스 제한
  maxInstances: 2
  minInstances: 0
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  # 사용할 OpenAI 모델 (빌드/런타임 모두 노출)
  - variable: OPENAI_MODEL
    value: gpt-4o-mini
    availability:
      - BUILD
      - RUNTIME

  # ──────────────────────────────────────────────────────────────
  # OpenAI 실제 호출을 켜려면(선택):
  #   1) 터미널에서:  firebase apphosting:secrets:set OPENAI_API_KEY
  #      (새 OpenAI 키 입력 → 백엔드 접근 권한 부여 yes)
  #   2) 아래 주석을 해제하고 다시 푸시
  #
  # - variable: OPENAI_API_KEY
  #   secret: OPENAI_API_KEY
  #   availability:
  #     - RUNTIME
  # ──────────────────────────────────────────────────────────────
  # 키가 없어도 AI 비서실장은 로컬 데이터 분석으로 정상 동작합니다.
