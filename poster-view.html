<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웹자보 보기</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyAIjhvbCztHoF7YwP2IYIk2C6jCI64uFhs",
    authDomain: "jjj2195-1bd15.firebaseapp.com",
    projectId: "jjj2195-1bd15",
    storageBucket: "jjj2195-1bd15.firebasestorage.app",
    messagingSenderId: "370852437825",
    appId: "1:370852437825:web:b0a891d6a99b426d230bc0"
  });
  const db = getFirestore(app);

  const params = new URLSearchParams(location.search);
  const posterId = params.get('id');

  if (!posterId) {
    document.getElementById('poster-area').innerHTML = '<div class="error-msg">잘못된 링크입니다.</div>';
  } else {
    getDoc(doc(db, 'posters', posterId)).then(d => {
      if (!d.exists()) {
        document.getElementById('poster-area').innerHTML = '<div class="error-msg">자보를 찾을 수 없습니다.</div>';
        return;
      }
      window.posterData = d.data();
      document.title = (window.posterData.title || '웹자보') + ' · 웹자보';
      renderViewPoster(window.posterData);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('poster-wrap').style.display = 'block';
    }).catch(e => {
      document.getElementById('poster-area').innerHTML = '<div class="error-msg">불러오기 실패: ' + e.message + '</div>';
    });
  }
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f0f2f5;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
#loading{text-align:center;color:#888;font-size:14px;padding:40px}
#poster-wrap{display:none;text-align:center}
.poster-canvas{width:360px;height:480px;border-radius:8px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.12);background:#fff;position:relative;margin:0 auto 16px}
.actions{display:flex;gap:10px;justify-content:center;margin-bottom:12px}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.btn-dark{background:#1f2937;color:#fff}
.btn-dark:hover{background:#111827}
.btn-outline{background:#fff;color:#4f46e5;border:1px solid #4f46e5}
.btn-outline:hover{background:#eef2ff}
.credit{font-size:11px;color:#aaa;margin-top:8px}
.credit a{color:#4f46e5;text-decoration:none}
.error-msg{text-align:center;color:#ef4444;font-size:14px;padding:40px}

.p-tpl{width:100%;height:100%;position:relative;overflow:hidden;display:flex;flex-direction:column}
.p-modern{background:#111}
.p-modern .p-bg{position:absolute;inset:0;background-size:cover;background-position:center}
.p-modern .p-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 20%,rgba(0,0,0,.88) 100%)}
.p-modern .p-body{position:absolute;bottom:44px;left:20px;right:20px;color:#fff}
.p-modern .p-title{font-size:24px;font-weight:800;line-height:1.2;margin-bottom:4px;word-break:keep-all}
.p-modern .p-subtitle{font-size:12px;opacity:.8;margin-bottom:12px}
.p-modern .p-accent-line{width:40px;height:3px;margin-bottom:10px;border-radius:2px}
.p-modern .p-detail{font-size:10.5px;opacity:.9;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.p-modern .p-desc{font-size:10px;opacity:.65;margin-top:8px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.p-modern .p-footer{position:absolute;bottom:0;left:0;right:0;height:36px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:600;letter-spacing:.3px}

.p-clean{background:#fff}
.p-clean .p-bar{height:5px;flex-shrink:0}
.p-clean .p-inner{padding:18px 20px;flex:1;display:flex;flex-direction:column}
.p-clean .p-photo-wrap{width:100%;height:170px;border-radius:8px;overflow:hidden;margin-bottom:14px;background:#f3f4f6;flex-shrink:0}
.p-clean .p-photo-wrap img{width:100%;height:100%;object-fit:cover}
.p-clean .p-photo-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:36px}
.p-clean .p-title{font-size:20px;font-weight:800;text-align:center;color:#1a1a1a;line-height:1.3;margin-bottom:3px;word-break:keep-all}
.p-clean .p-subtitle{font-size:11px;text-align:center;color:#888;margin-bottom:12px}
.p-clean .p-info-box{border-radius:8px;padding:10px 12px;margin-bottom:10px}
.p-clean .p-detail{font-size:10.5px;color:#333;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.p-clean .p-detail:last-child{margin-bottom:0}
.p-clean .p-desc{font-size:10px;color:#666;line-height:1.5;margin-bottom:auto;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.p-clean .p-footer-line{border-top:1px solid #eee;padding-top:10px;margin-top:10px;font-size:10px;font-weight:600}

.p-bold .p-header{padding:20px;color:#fff;display:flex;flex-direction:column;justify-content:flex-end;min-height:140px;flex-shrink:0}
.p-bold .p-title{font-size:24px;font-weight:900;line-height:1.15;word-break:keep-all}
.p-bold .p-subtitle{font-size:11px;opacity:.85;margin-top:4px}
.p-bold .p-photo-strip{width:100%;height:170px;background:#eee;flex-shrink:0;overflow:hidden}
.p-bold .p-photo-strip img{width:100%;height:100%;object-fit:cover}
.p-bold .p-photo-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:36px;background:#f3f4f6}
.p-bold .p-bottom{padding:14px 20px;flex:1;display:flex;flex-direction:column;background:#fff}
.p-bold .p-detail{font-size:10.5px;color:#444;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.p-bold .p-desc{font-size:10px;color:#666;line-height:1.5;margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.p-bold .p-footer-bar{margin-top:auto;padding-top:8px;font-size:10px;font-weight:700}

@media(max-width:400px){
  .poster-canvas{width:100%;max-width:360px;height:auto;aspect-ratio:3/4}
}
</style>
</head>
<body>

<div id="poster-area">
  <div id="loading">불러오는 중...</div>
  <div id="poster-wrap">
    <div class="poster-canvas" id="poster-canvas"></div>
    <div class="actions">
      <button class="btn btn-dark" onclick="downloadViewPoster()">📥 이미지 저장</button>
      <button class="btn btn-outline" onclick="location.href='poster.html'">🎨 나도 만들기</button>
    </div>
    <div class="credit">당원 관리 시스템 · <a href="poster.html">웹자보 만들기</a></div>
  </div>
</div>

<script>
function escHtml(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):'';}

function lightenColor(hex,amt){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
  return 'rgb('+r+','+g+','+b+')';
}

function buildDetails(d,color){
  var r='';
  if(d.date)r+='<div class="p-detail" style="color:'+color+'"><span>📅</span> '+escHtml(d.date)+'</div>';
  if(d.time)r+='<div class="p-detail" style="color:'+color+'"><span>🕐</span> '+escHtml(d.time)+'</div>';
  if(d.location)r+='<div class="p-detail" style="color:'+color+'"><span>📍</span> '+escHtml(d.location)+'</div>';
  return r;
}

function renderViewPoster(d){
  var canvas=document.getElementById('poster-canvas');
  var html='';
  if(d.template==='modern') html=buildModernView(d);
  else if(d.template==='clean') html=buildCleanView(d);
  else html=buildBoldView(d);
  canvas.innerHTML=html;
}

function buildModernView(d){
  var bg=d.photo?'background-image:url('+d.photo+')':'background:linear-gradient(135deg,'+d.color+',#1a1a2e)';
  return '<div class="p-tpl p-modern">'+
    '<div class="p-bg" style="'+bg+'"></div>'+
    '<div class="p-overlay"></div>'+
    '<div class="p-body">'+
      '<div class="p-title">'+escHtml(d.title)+'</div>'+
      (d.subtitle?'<div class="p-subtitle">'+escHtml(d.subtitle)+'</div>':'')+
      '<div class="p-accent-line" style="background:'+d.color+'"></div>'+
      buildDetails(d,'#fff')+
      (d.description?'<div class="p-desc">'+escHtml(d.description)+'</div>':'')+
    '</div>'+
    '<div class="p-footer" style="background:'+d.color+'">'+escHtml(d.organizer||'')+'</div>'+
  '</div>';
}

function buildCleanView(d){
  var photoHtml=d.photo?'<img src="'+d.photo+'">':'<div class="p-photo-placeholder">📷</div>';
  var infoBoxBg=lightenColor(d.color,200);
  return '<div class="p-tpl p-clean">'+
    '<div class="p-bar" style="background:'+d.color+'"></div>'+
    '<div class="p-inner">'+
      '<div class="p-photo-wrap">'+photoHtml+'</div>'+
      '<div class="p-title">'+escHtml(d.title)+'</div>'+
      (d.subtitle?'<div class="p-subtitle">'+escHtml(d.subtitle)+'</div>':'<div style="margin-bottom:12px"></div>')+
      '<div class="p-info-box" style="background:'+infoBoxBg+'">'+buildDetails(d,'#333')+'</div>'+
      (d.description?'<div class="p-desc">'+escHtml(d.description)+'</div>':'')+
      '<div class="p-footer-line" style="color:'+d.color+'">'+escHtml(d.organizer||'')+'</div>'+
    '</div>'+
  '</div>';
}

function buildBoldView(d){
  var photoHtml=d.photo?'<img src="'+d.photo+'">':'<div class="p-photo-placeholder">📷</div>';
  return '<div class="p-tpl p-bold">'+
    '<div class="p-header" style="background:'+d.color+'">'+
      '<div class="p-title">'+escHtml(d.title)+'</div>'+
      (d.subtitle?'<div class="p-subtitle">'+escHtml(d.subtitle)+'</div>':'')+
    '</div>'+
    '<div class="p-photo-strip">'+photoHtml+'</div>'+
    '<div class="p-bottom">'+
      buildDetails(d,'#444')+
      (d.description?'<div class="p-desc">'+escHtml(d.description)+'</div>':'')+
      '<div class="p-footer-bar" style="color:'+d.color+'">'+escHtml(d.organizer||'')+'</div>'+
    '</div>'+
  '</div>';
}

async function downloadViewPoster(){
  try{
    var canvas=document.getElementById('poster-canvas');
    var result=await html2canvas(canvas,{scale:3,useCORS:true,backgroundColor:'#ffffff'});
    var link=document.createElement('a');
    link.download='poster_'+Date.now()+'.png';
    link.href=result.toDataURL('image/png');
    link.click();
  }catch(e){alert('이미지 생성 실패: '+e.message);}
}
</script>
</body>
</html>
