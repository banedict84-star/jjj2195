name: Deploy MOIDA Calendar Bot

# functions 코드가 바뀌어 푸시되면 자동으로 Firebase에 배포합니다.
on:
  push:
    branches: [claude/lucid-galileo-r4ymtf]
    paths:
      - "functions/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {} # GitHub Actions 탭에서 수동 실행도 가능

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install functions dependencies
        working-directory: functions
        run: npm install

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy kakaoSkill function
        run: firebase deploy --only functions:kakaoSkill --project jjj2195-1bd15 --non-interactive --force
