name: Deploy MOIDA Calendar Bot

# functions 코드가 바뀌어 푸시되면 자동으로 Firebase에 배포합니다.
on:
  push:
    branches: [claude/lucid-galileo-r4ymtf]
    paths:
      - "functions/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {} # GitHub Actions 탭에서 수동 실행도 가능

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install functions dependencies
        working-directory: functions
        run: npm install

      - name: Decode service account key
        run: |
          echo "${{ secrets.GCP_SA_KEY }}" | base64 -d > "$HOME/gcp-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcp-sa.json" >> "$GITHUB_ENV"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy functions
        run: firebase deploy --only functions:kakaoSkill,functions:googleAuthStart,functions:googleAuthCallback --project jjj2195-1bd15 --non-interactive --force
