name: Deploy MOIDA Calendar Bot

on:
  push:
    branches: [claude/lucid-galileo-r4ymtf]
    paths:
      - "functions/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      kakao_code:
        description: "(선택) 카카오 인증코드 - 입력 시 카카오 시크릿 등록"
        required: false
        default: ""
      run_briefing:
        description: "(선택) true 입력 시 아침 브리핑 즉시 1회 발송 테스트"
        required: false
        default: ""
      show_logs:
        description: "(선택) true 입력 시 브리핑 트리거 후 함수 로그 출력"
        required: false
        default: ""
      debug_kakao:
        description: "(선택) true 입력 시 카카오 refresh 직접 호출해 에러 확인"
        required: false
        default: ""
      test_poster:
        description: "(선택) true 입력 시 웹자보 샘플 렌더 후 이미지 URL 반환"
        required: false
        default: ""
      dump_bot_logs:
        description: "(선택) true 입력 시 kakaoSkill/posterWorker 최근 로그 출력"
        required: false
        default: ""
      create_bucket:
        description: "(선택) true 입력 시 웹자보용 Storage 버킷 생성+공개설정 (1회)"
        required: false
        default: ""
      test_worker:
        description: "(선택) true 입력 시 posterWorker 호출 → 나에게 보내기 실제 발송 테스트"
        required: false
        default: ""
      test_design:
        description: "(선택) true 입력 시 AI 생성 SVG 디자인을 받아 출력(로컬 렌더 확인용)"
        required: false
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install functions dependencies
        working-directory: functions
        run: npm install

      - name: Decode service account key
        run: |
          echo "${{ secrets.GCP_SA_KEY }}" | base64 -d > "$HOME/gcp-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcp-sa.json" >> "$GITHUB_ENV"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Create poster storage bucket (optional, one-time)
        if: ${{ github.event.inputs.create_bucket == 'true' }}
        run: |
          gcloud auth activate-service-account --key-file="$GOOGLE_APPLICATION_CREDENTIALS"
          gcloud storage buckets create gs://jjj2195-1bd15-moida \
            --location=asia-northeast3 --project=jjj2195-1bd15 \
            --uniform-bucket-level-access || echo "버킷이 이미 있거나 생성 생략"
          gcloud storage buckets add-iam-policy-binding gs://jjj2195-1bd15-moida \
            --member=allUsers --role=roles/storage.objectViewer --project=jjj2195-1bd15 || true
          echo "✅ 버킷 준비 완료: gs://jjj2195-1bd15-moida"

      - name: Setup Kakao secrets (optional)
        if: ${{ github.event.inputs.kakao_code != '' }}
        env:
          KCODE: ${{ github.event.inputs.kakao_code }}
          REST_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
        run: |
          RESP=$(curl -s -X POST "https://kauth.kakao.com/oauth/token" \
            -d "grant_type=authorization_code" \
            -d "client_id=$REST_KEY" \
            -d "client_secret=$CLIENT_SECRET" \
            -d "redirect_uri=https://localhost:3000" \
            -d "code=$KCODE")
          RT=$(echo "$RESP" | jq -r '.refresh_token // empty')
          if [ -z "$RT" ]; then
            echo "::error::refresh_token 발급 실패. 응답: $RESP"
            exit 1
          fi
          echo "::add-mask::$RT"
          printf '%s' "$REST_KEY" > /tmp/k1
          printf '%s' "$CLIENT_SECRET" > /tmp/k2
          printf '%s' "$RT" > /tmp/k3
          firebase functions:secrets:set KAKAO_REST_API_KEY --data-file /tmp/k1 --project jjj2195-1bd15
          firebase functions:secrets:set KAKAO_CLIENT_SECRET --data-file /tmp/k2 --project jjj2195-1bd15
          firebase functions:secrets:set KAKAO_REFRESH_TOKEN --data-file /tmp/k3 --project jjj2195-1bd15
          rm -f /tmp/k1 /tmp/k2 /tmp/k3
          echo "✅ 카카오 시크릿 3개 등록 완료"

      - name: Sync OpenAI key to Firebase secret
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$OPENAI_KEY" ]; then
            echo "::add-mask::$OPENAI_KEY"
            printf '%s' "$OPENAI_KEY" > /tmp/oai
            firebase functions:secrets:set OPENAI_API_KEY --data-file /tmp/oai --project jjj2195-1bd15
            rm -f /tmp/oai
            echo "✅ OpenAI 시크릿 등록/갱신 완료"
          else
            echo "ℹ️ GitHub secret OPENAI_API_KEY 없음 — OpenAI 비활성(템플릿/MyAPI 사용)"
          fi

      - name: Debug Kakao refresh (optional)
        if: ${{ github.event.inputs.debug_kakao == 'true' }}
        run: |
          gcloud auth activate-service-account --key-file="$GOOGLE_APPLICATION_CREDENTIALS"
          RT=$(gcloud secrets versions access latest --secret=KAKAO_REFRESH_TOKEN --project=jjj2195-1bd15)
          RK=$(gcloud secrets versions access latest --secret=KAKAO_REST_API_KEY --project=jjj2195-1bd15)
          CS=$(gcloud secrets versions access latest --secret=KAKAO_CLIENT_SECRET --project=jjj2195-1bd15)
          echo "lengths -> RT:${#RT} RK:${#RK} CS:${#CS}"
          echo "=== refresh WITH client_secret ==="
          curl -s -X POST https://kauth.kakao.com/oauth/token -d grant_type=refresh_token -d "client_id=$RK" -d "client_secret=$CS" -d "refresh_token=$RT" | python3 -c "import sys,json;d=json.load(sys.stdin);print({k:('<hidden>' if 'token' in k else v) for k,v in d.items()})" || true
          echo "=== refresh WITHOUT client_secret ==="
          curl -s -X POST https://kauth.kakao.com/oauth/token -d grant_type=refresh_token -d "client_id=$RK" -d "refresh_token=$RT" | python3 -c "import sys,json;d=json.load(sys.stdin);print({k:('<hidden>' if 'token' in k else v) for k,v in d.items()})" || true

      - name: Deploy functions
        run: firebase deploy --only functions:kakaoSkill,functions:googleAuthStart,functions:googleAuthCallback,functions:morningBriefing,functions:testKakao,functions:posterWorker,functions:posterImage,functions:testPoster --project jjj2195-1bd15 --non-interactive --force

      - name: Test poster render (optional)
        if: ${{ github.event.inputs.test_poster == 'true' }}
        run: |
          echo "=== testPoster (json) ==="
          curl -s "https://asia-northeast3-jjj2195-1bd15.cloudfunctions.net/testPoster?format=json" ; echo ""

      - name: Test posterWorker → 나에게 보내기 (optional)
        if: ${{ github.event.inputs.test_worker == 'true' }}
        run: |
          echo "=== posterWorker 호출 (콜백 없음 → 나에게 보내기) ==="
          curl -s -X POST "https://asia-northeast3-jjj2195-1bd15.cloudfunctions.net/posterWorker" \
            -H "Content-Type: application/json" \
            --data '{"brief":"행사명: 수암 119안전센터 개청식 참석\n일시: 2026년 6월 25일(수)\n장소: 수암 119안전센터\n내용: 개청식에 참석해 지역 안전 인프라 확충을 함께 축하했습니다."}' \
            --max-time 110 ; echo ""

      - name: Test AI design (optional)
        if: ${{ github.event.inputs.test_design == 'true' }}
        run: |
          echo "=== OpenAI 키/호출 점검 ==="
          curl -s "https://asia-northeast3-jjj2195-1bd15.cloudfunctions.net/testPoster?format=oai" --max-time 40 ; echo ""
          echo "=== testPoster json (designedBy) ==="
          curl -s "https://asia-northeast3-jjj2195-1bd15.cloudfunctions.net/testPoster?format=json" --max-time 110 ; echo ""
          echo "=== BEGIN AI SVG ==="
          curl -s "https://asia-northeast3-jjj2195-1bd15.cloudfunctions.net/testPoster?format=svg" --max-time 110
          echo ""
          echo "=== END AI SVG ==="

      - name: Dump bot logs (optional)
        if: ${{ github.event.inputs.dump_bot_logs == 'true' }}
        run: |
          gcloud auth activate-service-account --key-file="$GOOGLE_APPLICATION_CREDENTIALS"
          echo "=== kakaoSkill logs (recent) ==="
          gcloud logging read 'resource.labels.service_name="kakaoskill"' --project=jjj2195-1bd15 --limit=40 --freshness=30m --format="value(timestamp,textPayload,jsonPayload.message)" || true
          echo "=== posterWorker logs (recent) ==="
          gcloud logging read 'resource.labels.service_name="posterworker"' --project=jjj2195-1bd15 --limit=40 --freshness=30m --format="value(timestamp,textPayload,jsonPayload.message)" || true

      - name: Curl testKakao (synchronous result)
        if: ${{ github.event.inputs.show_logs == 'true' }}
        run: |
          echo "=== testKakao response ==="
          curl -s https://asia-northeast3-jjj2195-1bd15.cloudfunctions.net/testKakao ; echo ""

      - name: Test run morning briefing (optional)
        if: ${{ github.event.inputs.run_briefing == 'true' }}
        run: |
          gcloud auth activate-service-account --key-file="$GOOGLE_APPLICATION_CREDENTIALS"
          gcloud scheduler jobs run firebase-schedule-morningBriefing-asia-northeast3 \
            --location=asia-northeast3 --project=jjj2195-1bd15 \
          || gcloud scheduler jobs list --location=asia-northeast3 --project=jjj2195-1bd15

      - name: Debug briefing (trigger + read logs)
        if: ${{ github.event.inputs.show_logs == 'true' }}
        run: |
          gcloud auth activate-service-account --key-file="$GOOGLE_APPLICATION_CREDENTIALS"
          gcloud scheduler jobs run firebase-schedule-morningBriefing-asia-northeast3 --location=asia-northeast3 --project=jjj2195-1bd15 || true
          echo "=== waiting 70s for logs ==="
          sleep 70
          echo "=== morningBriefing logs (recent first) ==="
          gcloud logging read 'resource.labels.service_name="morningbriefing"' --project=jjj2195-1bd15 --limit=25 --freshness=15m --format="value(timestamp,severity,textPayload,jsonPayload.message)" || true
