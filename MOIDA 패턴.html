<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOIDA · 패턴 빌더</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  :root{
    --bg:#f3f5f8; --surface:#ffffff; --line:#eceef3; --line-soft:#f1f3f7;
    --ink:#1c2030; --ink-2:#5a6072; --ink-3:#9298a8;
    --primary:#4f46e5; --primary-soft:#eef0fe;
    --shadow-card: 0 1px 2px rgba(22,26,45,.04), 0 8px 28px rgba(22,26,45,.07);
    --shadow-float: 0 2px 6px rgba(22,26,45,.05), 0 18px 44px rgba(22,26,45,.12);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{ font-family:"Pretendard Variable",Pretendard,-apple-system,system-ui,sans-serif;
    background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased; letter-spacing:-.01em; }
  .app{ display:grid; grid-template-columns:236px 1fr; min-height:100vh; transition:grid-template-columns .22s ease; }

  /* ===== Sidebar ===== */
  .sidebar{ background:var(--surface); border-right:1px solid var(--line); display:flex; flex-direction:column; padding:18px 16px; position:sticky; top:0; height:100vh; overflow-y:auto; }
  .side-top{ display:flex; align-items:center; justify-content:space-between; gap:8px; position:relative; }
  .logo{ display:flex; align-items:center; gap:11px; padding:8px 8px 18px; }
  .logo-mark{ width:36px; height:36px; border-radius:11px; flex-shrink:0; background:linear-gradient(140deg,#6a5cf5 0%,#4f46e5 60%,#4338ca 100%); display:flex; align-items:center; justify-content:center; box-shadow:0 5px 14px rgba(79,70,229,.34); position:relative; overflow:hidden; }
  .logo-mark::after{ content:""; position:absolute; inset:0; background:radial-gradient(65% 55% at 28% 20%, rgba(255,255,255,.42), rgba(255,255,255,0) 70%); }
  .logo-name{ font-size:20px; font-weight:800; letter-spacing:-.04em; color:#1c2030; line-height:1; }
  .logo-name b{ color:var(--primary); font-weight:800; }
  .collapse-btn{ position:absolute; top:1px; right:0; width:30px; height:30px; border-radius:9px; border:1px solid var(--line); background:var(--surface); color:var(--ink-3); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:background .14s,color .14s; }
  .collapse-btn:hover{ background:var(--line-soft); color:var(--ink-2); }
  .collapse-btn svg{ transition:transform .22s ease; }
  .app.collapsed{ grid-template-columns:72px 1fr; }
  .app.collapsed .sidebar{ padding:18px 12px; }
  .app.collapsed .logo{ justify-content:center; }
  .app.collapsed .logo-name{ display:none; }
  .app.collapsed .collapse-btn{ position:static; }
  .app.collapsed .collapse-btn svg{ transform:rotate(180deg); }
  .app.collapsed .nav-item{ justify-content:center; padding:11px 0; gap:0; }
  .app.collapsed .nav-item .nm,.app.collapsed .sec{ display:none; }

  nav{ display:flex; flex-direction:column; gap:2px; margin-top:14px; }
  .nav-item{ display:flex; align-items:center; gap:11px; padding:10px 10px; border-radius:11px; cursor:pointer; color:var(--ink-2); font-size:14px; font-weight:600; text-decoration:none; transition:background .14s,color .14s; }
  .nav-item:hover{ background:var(--line-soft); color:var(--ink); }
  .nav-item.active{ background:var(--primary-soft); color:var(--primary); }
  .nav-item.active svg{ color:var(--primary); }
  .nav-item svg{ color:var(--ink-3); }
  .nav-item .nm{ flex:1; }
  .sec{ padding:18px 10px 8px; font-size:11.5px; font-weight:700; color:var(--ink-3); letter-spacing:.04em; }
  .side-foot{ margin-top:auto; padding-top:14px; border-top:1px solid var(--line); }
  .foot-item{ display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:10px; color:var(--ink-2); font-size:13.5px; font-weight:600; cursor:pointer; text-decoration:none; transition:background .14s; }
  .foot-item:hover{ background:var(--line-soft); }
  .foot-item svg{ color:var(--ink-3); }

  /* ===== Main ===== */
  .main{ display:flex; flex-direction:column; min-width:0; }
  .topbar{ display:flex; align-items:center; gap:16px; padding:18px 28px; border-bottom:1px solid var(--line); background:var(--surface); flex-wrap:wrap; }
  .tb-title h1{ font-size:21px; font-weight:800; letter-spacing:-.03em; }
  .tb-title p{ font-size:13px; color:var(--ink-3); margin-top:3px; font-weight:500; }
  .tb-actions{ display:flex; gap:8px; margin-left:auto; flex-wrap:wrap; }
  .btn{ display:inline-flex; align-items:center; gap:7px; border:1px solid var(--line); background:var(--surface); color:var(--ink-2); border-radius:10px; padding:9px 13px; font-size:13px; font-weight:600; font-family:inherit; cursor:pointer; transition:background .14s,border-color .14s,color .14s,transform .1s; }
  .btn:hover{ background:var(--line-soft); color:var(--ink); }
  .btn:active{ transform:translateY(1px); }
  .btn svg{ color:var(--ink-3); }
  .btn.primary{ background:#15182a; color:#fff; border-color:#15182a; }
  .btn.primary:hover{ background:#23273c; }
  .btn.primary svg{ color:#fff; }
  .btn.danger:hover{ background:#fdecec; color:#d33; border-color:#f6cccc; }

  .builder{ display:grid; grid-template-columns:330px 1fr; gap:0; flex:1; min-height:0; }
  .panel{ border-right:1px solid var(--line); background:var(--surface); padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:18px; }
  .pcard{ border:1px solid var(--line); border-radius:16px; padding:16px; }
  .pcard h3{ font-size:13px; font-weight:700; color:var(--ink-2); margin-bottom:13px; display:flex; align-items:center; gap:7px; }
  .pcard h3 .hint{ margin-left:auto; font-size:11px; font-weight:600; color:var(--ink-3); }

  /* direction dial */
  .dir-wrap{ display:flex; gap:16px; align-items:center; }
  #dial{ flex-shrink:0; cursor:pointer; touch-action:none; }
  .dir-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:5px; flex:1; }
  .dir-btn{ aspect-ratio:1; border:1px solid var(--line); background:var(--surface); border-radius:9px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--ink-2); font-size:15px; transition:background .12s,border-color .12s; }
  .dir-btn:hover{ background:var(--primary-soft); border-color:var(--primary); color:var(--primary); }
  .dir-center{ font-size:12px; font-weight:800; color:var(--primary); flex-direction:column; gap:0; cursor:default; }
  .dir-center:hover{ background:var(--surface); border-color:var(--line); color:var(--primary); }
  .dir-center small{ font-size:8.5px; color:var(--ink-3); font-weight:600; }

  .angle-row{ display:flex; align-items:center; gap:8px; margin-top:13px; }
  .angle-row label{ font-size:12px; font-weight:600; color:var(--ink-2); }
  .num{ width:64px; border:1px solid var(--line); border-radius:8px; padding:7px 8px; font-size:13px; font-family:inherit; color:var(--ink); outline:none; }
  .num:focus{ border-color:var(--primary); }
  .rot{ width:32px; height:32px; border:1px solid var(--line); background:var(--surface); border-radius:8px; cursor:pointer; color:var(--ink-2); font-size:15px; font-weight:700; }
  .rot:hover{ background:var(--line-soft); }
  .snap-row{ display:flex; align-items:center; gap:7px; margin-top:11px; font-size:12px; color:var(--ink-2); font-weight:600; }
  .snap-row input[type=number]{ width:46px; }

  /* length blocks */
  .now-dir{ display:flex; align-items:center; gap:10px; background:var(--primary-soft); border-radius:11px; padding:11px 13px; margin-bottom:13px; }
  .now-dir .ar{ font-size:22px; color:var(--primary); width:26px; text-align:center; }
  .now-dir .tx{ font-size:12.5px; color:#3b34b8; font-weight:600; line-height:1.4; }
  .now-dir .tx b{ font-size:15px; color:var(--primary); }
  .chips{ display:flex; flex-wrap:wrap; gap:7px; }
  .chip{ border:1px solid var(--line); background:var(--surface); border-radius:10px; padding:9px 0; flex:1 0 28%; text-align:center; font-size:14px; font-weight:700; color:var(--ink); cursor:pointer; transition:background .12s,border-color .12s,transform .08s; }
  .chip:hover{ background:var(--primary); color:#fff; border-color:var(--primary); }
  .chip:active{ transform:scale(.96); }
  .custom-row{ display:flex; gap:7px; margin-top:9px; }
  .custom-row input{ flex:1; border:1px solid var(--line); border-radius:9px; padding:8px 10px; font-size:13px; font-family:inherit; outline:none; }
  .custom-row input:focus{ border-color:var(--primary); }
  .custom-row button{ border:1px solid var(--line); background:var(--line-soft); border-radius:9px; padding:0 14px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; color:var(--ink-2); }
  .custom-row button:hover{ background:var(--primary-soft); color:var(--primary); }

  /* block list */
  .blocks{ display:flex; flex-direction:column; gap:6px; max-height:230px; overflow-y:auto; }
  .blk{ display:flex; align-items:center; gap:10px; border:1px solid var(--line); border-radius:10px; padding:8px 11px; font-size:13px; }
  .blk .bn{ width:20px; height:20px; border-radius:6px; background:var(--line-soft); color:var(--ink-3); font-size:10.5px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .blk .ar{ font-size:17px; color:var(--primary); width:20px; text-align:center; }
  .blk .ln{ font-weight:700; }
  .blk .dg{ color:var(--ink-3); font-size:11.5px; font-weight:600; }
  .blk .x{ margin-left:auto; color:var(--ink-3); cursor:pointer; width:22px; height:22px; border-radius:6px; display:flex; align-items:center; justify-content:center; }
  .blk .x:hover{ background:#fdecec; color:#d33; }
  .blk.closing{ background:var(--line-soft); }
  .blk-empty{ color:var(--ink-3); font-size:12.5px; text-align:center; padding:14px 0; font-weight:500; }

  /* stage */
  .stage{ position:relative; background:var(--bg); display:flex; flex-direction:column; min-width:0; }
  .stage-svg{ flex:1; min-height:0; }
  #canvas{ width:100%; height:100%; display:block; }
  .stat-bar{ display:flex; gap:22px; padding:12px 22px; background:var(--surface); border-top:1px solid var(--line); flex-wrap:wrap; }
  .stat{ display:flex; flex-direction:column; gap:2px; }
  .stat .k{ font-size:11px; color:var(--ink-3); font-weight:600; }
  .stat .v{ font-size:16px; font-weight:800; letter-spacing:-.02em; }
  .stat .v small{ font-size:11px; color:var(--ink-3); font-weight:600; }
  .save-row{ display:flex; gap:7px; align-items:center; }
  .save-row select{ flex:1; border:1px solid var(--line); border-radius:9px; padding:8px 9px; font-size:12.5px; font-family:inherit; color:var(--ink-2); outline:none; background:var(--surface); }

  @media (max-width:980px){
    .app,.app.collapsed{ grid-template-columns:1fr; } .sidebar{ display:none; }
    .builder{ grid-template-columns:1fr; } .panel{ border-right:none; border-bottom:1px solid var(--line); }
    .stage-svg{ min-height:380px; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- ===== Sidebar ===== -->
  <aside class="sidebar">
    <div class="side-top">
      <div class="logo">
        <div class="logo-mark"><svg width="21" height="21" viewBox="0 0 24 24" fill="none">
          <path d="M7 8.5 12 14.5 17 8.5" stroke="#fff" stroke-opacity=".55" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="7" cy="8" r="2.6" fill="#fff"/><circle cx="17" cy="8" r="2.6" fill="#fff"/><circle cx="12" cy="15.5" r="3.1" fill="#fff"/>
        </svg></div>
        <div class="logo-name">MO<b>IDA</b></div>
      </div>
      <button class="collapse-btn" data-collapse aria-label="사이드바 접기"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg></button>
    </div>

    <nav>
      <a class="nav-item" href="MOIDA Dashboard v2.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg><span class="nm">대시보드</span></a>
      <a class="nav-item" href="MOIDA 공지사항.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 14-6v14L3 13z"/><path d="M3 11v2a2 2 0 0 0 2 2h2"/></svg><span class="nm">공지사항</span></a>
      <a class="nav-item" href="MOIDA 조직관리.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3 20a6 6 0 0 1 12 0"/><circle cx="17" cy="7" r="2.3"/><path d="M16.5 13.5a5 5 0 0 1 4.5 5"/></svg><span class="nm">조직관리</span></a>
      <a class="nav-item" href="MOIDA 일정.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="4.5" width="17" height="16" rx="3"/><path d="M3.5 9h17M8 3v3M16 3v3"/></svg><span class="nm">일정</span></a>
    </nav>

    <div class="sec">디자인 도구</div>
    <nav>
      <a class="nav-item active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19 19 4"/><path d="M5 5h3v3H5zM16 16h3v3h-3z"/><path d="M4 14v5h5"/></svg><span class="nm">패턴 빌더</span></a>
    </nav>

    <div class="side-foot">
      <a class="foot-item" href="MOIDA Dashboard v2.html"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 4h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-3"/><path d="M10 17l5-5-5-5M15 12H3"/></svg><span>대시보드로</span></a>
    </div>
  </aside>

  <!-- ===== Main ===== -->
  <main class="main">
    <div class="topbar">
      <div class="tb-title">
        <h1>패턴 빌더</h1>
        <p>방향을 정하고 길이 블록을 눌러 선을 이어 패턴을 만드세요</p>
      </div>
      <div class="tb-actions">
        <button class="btn" id="btnUndo"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 0 10h-1"/></svg>되돌리기</button>
        <button class="btn" id="btnClose"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><circle cx="5" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg><span id="closeLbl">닫기</span></button>
        <button class="btn danger" id="btnClear"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>초기화</button>
        <button class="btn" id="btnSvg"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M8 11l4 4 4-4"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>SVG</button>
        <button class="btn primary" id="btnPng"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>PNG</button>
      </div>
    </div>

    <div class="builder">
      <!-- control panel -->
      <div class="panel">
        <!-- direction -->
        <div class="pcard">
          <h3>① 방향 정하기 <span class="hint">각도 자유</span></h3>
          <div class="dir-wrap">
            <svg id="dial" width="124" height="124" viewBox="0 0 124 124"></svg>
            <div class="dir-grid">
              <div class="dir-btn" data-ang="135">↖</div>
              <div class="dir-btn" data-ang="90">↑</div>
              <div class="dir-btn" data-ang="45">↗</div>
              <div class="dir-btn" data-ang="180">←</div>
              <div class="dir-btn dir-center" id="dirCenter">0°<small>방향</small></div>
              <div class="dir-btn" data-ang="0">→</div>
              <div class="dir-btn" data-ang="225">↙</div>
              <div class="dir-btn" data-ang="270">↓</div>
              <div class="dir-btn" data-ang="315">↘</div>
            </div>
          </div>
          <div class="angle-row">
            <label>각도</label>
            <input class="num" type="number" id="angleInput" step="1" value="90">
            <span style="color:var(--ink-3);font-size:13px">°</span>
            <button class="rot" id="rotL" title="반시계 회전">↺</button>
            <button class="rot" id="rotR" title="시계 회전">↻</button>
          </div>
          <div class="snap-row">
            <input type="checkbox" id="snapChk" checked>
            <span>각도 스냅</span>
            <input class="num" type="number" id="snapStep" value="15" min="1" max="90">
            <span style="color:var(--ink-3)">° 단위</span>
          </div>
        </div>

        <!-- length blocks -->
        <div class="pcard">
          <h3>② 길이 블록 누르기 <span class="hint">눌러서 누적</span></h3>
          <div class="now-dir">
            <span class="ar" id="nowAr">↑</span>
            <span class="tx">지금 방향 <b id="nowDeg">90°</b><br>아래 블록을 누르면 이 방향으로 그려져요</span>
          </div>
          <div class="chips" id="chips"></div>
          <div class="custom-row">
            <input type="number" id="customLen" placeholder="직접 입력 (cm)" step="0.1" min="0.1">
            <button id="addCustom">추가</button>
          </div>
        </div>

        <!-- block list -->
        <div class="pcard">
          <h3>③ 블록 순서 <span class="hint" id="blkHint">0개</span></h3>
          <div class="blocks" id="blocks"></div>
        </div>

        <!-- save / load -->
        <div class="pcard">
          <h3>패턴 저장</h3>
          <div class="save-row">
            <select id="saveList"><option value="">저장된 패턴…</option></select>
            <button class="btn" id="btnLoad">불러오기</button>
          </div>
          <div class="save-row" style="margin-top:8px">
            <button class="btn" id="btnSave" style="flex:1;justify-content:center"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h11l3 3v13H5z"/><path d="M8 4v5h7"/></svg>현재 패턴 저장</button>
            <button class="btn danger" id="btnDelSave">삭제</button>
          </div>
        </div>
      </div>

      <!-- stage -->
      <div class="stage">
        <div class="stage-svg"><svg id="canvas" preserveAspectRatio="xMidYMid meet"></svg></div>
        <div class="stat-bar">
          <div class="stat"><span class="k">총 길이</span><span class="v" id="stTotal">0 <small>cm</small></span></div>
          <div class="stat"><span class="k">선분</span><span class="v" id="stSeg">0 <small>개</small></span></div>
          <div class="stat"><span class="k">현재 위치</span><span class="v" id="stPos" style="font-size:14px">0.0, 0.0 <small>cm</small></span></div>
          <div class="stat"><span class="k">가로 × 세로</span><span class="v" id="stBox" style="font-size:14px">0 × 0 <small>cm</small></span></div>
          <div class="stat"><span class="k">상태</span><span class="v" id="stClosed" style="font-size:14px">열림</span></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
(function(){
  "use strict";
  /* ---------- state ---------- */
  const PRESETS = [0.5, 1, 2, 5, 10];
  let ops = [];          // one entry per click: {a:angle°, l:length cm}
  let heading = 90;      // current direction, math degrees (0=→, 90=↑)
  let unit = 1;          // last used length (keyboard Enter)
  let closed = false;
  const VBW = 1000, VBH = 700, PAD = 64;
  const SAVE_KEY = 'moida_patterns';

  /* ---------- helpers ---------- */
  const norm = a => ((a % 360) + 360) % 360;
  const rad = d => d * Math.PI / 180;
  const ARROWS = ['→','↗','↑','↖','←','↙','↓','↘'];
  function arrowFor(a){ return ARROWS[(Math.round(norm(a)/45)) % 8]; }
  function fmt(n){ return (Math.round(n*100)/100).toString(); }

  // delta in SVG coords: up (90°) => negative y
  function deltaOf(a, l){ return { dx: l*Math.cos(rad(a)), dy: -l*Math.sin(rad(a)) }; }

  function points(){
    const pts = [{x:0,y:0}];
    let x=0,y=0;
    for(const op of ops){ const d=deltaOf(op.a, op.l); x+=d.dx; y+=d.dy; pts.push({x,y}); }
    return pts;
  }

  // merge consecutive same-angle ops for display: [{a,l,start,count}]
  function strokes(){
    const out=[];
    for(let i=0;i<ops.length;i++){
      const o=ops[i], last=out[out.length-1];
      if(last && Math.abs(last.a-o.a)<1e-6){ last.l+=o.l; last.count++; }
      else out.push({a:o.a, l:o.l, start:i, count:1});
    }
    return out;
  }

  /* ---------- direction dial ---------- */
  const dial = document.getElementById('dial');
  function drawDial(){
    const cx=62, cy=62, r=50;
    let s = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#f7f8fc" stroke="#eceef3" stroke-width="2"/>`;
    for(let a=0;a<360;a+=45){
      const x1=cx+Math.cos(rad(a))*(r-7), y1=cy-Math.sin(rad(a))*(r-7);
      const x2=cx+Math.cos(rad(a))*r, y2=cy-Math.sin(rad(a))*r;
      s+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#d6dae6" stroke-width="1.5"/>`;
    }
    const hx=cx+Math.cos(rad(heading))*(r-9), hy=cy-Math.sin(rad(heading))*(r-9);
    s+=`<line x1="${cx}" y1="${cy}" x2="${hx.toFixed(1)}" y2="${hy.toFixed(1)}" stroke="#4f46e5" stroke-width="3" stroke-linecap="round"/>`;
    s+=`<circle cx="${hx.toFixed(1)}" cy="${hy.toFixed(1)}" r="6" fill="#4f46e5"/>`;
    s+=`<circle cx="${cx}" cy="${cy}" r="4" fill="#15182a"/>`;
    dial.innerHTML=s;
  }
  function dialPick(e){
    const rc=dial.getBoundingClientRect();
    const x=(e.clientX-rc.left)/rc.width*124, y=(e.clientY-rc.top)/rc.height*124;
    let a=Math.atan2(-(y-62), x-62)*180/Math.PI;
    setHeading(a);
  }
  let dragging=false;
  dial.addEventListener('pointerdown', e=>{ dragging=true; dial.setPointerCapture(e.pointerId); dialPick(e); });
  dial.addEventListener('pointermove', e=>{ if(dragging) dialPick(e); });
  dial.addEventListener('pointerup', ()=> dragging=false);
  dial.addEventListener('pointercancel', ()=> dragging=false);

  /* ---------- heading control ---------- */
  function setHeading(a){
    a = norm(a);
    if(document.getElementById('snapChk').checked){
      const step=Math.max(1, parseFloat(document.getElementById('snapStep').value)||15);
      a = norm(Math.round(a/step)*step);
    }
    heading = Math.round(a*10)/10;
    syncHeadingUI();
  }
  function syncHeadingUI(){
    document.getElementById('angleInput').value = heading;
    document.getElementById('dirCenter').firstChild.nodeValue = heading+'°';
    document.getElementById('nowAr').textContent = arrowFor(heading);
    document.getElementById('nowDeg').textContent = heading+'°';
    drawDial();
  }

  document.querySelectorAll('.dir-btn[data-ang]').forEach(b=>{
    b.addEventListener('click', ()=> setHeading(parseFloat(b.dataset.ang)));
  });
  document.getElementById('angleInput').addEventListener('input', e=>{
    const v=parseFloat(e.target.value); if(!isNaN(v)){ heading=norm(v); syncHeadingUINoInput(); }
  });
  function syncHeadingUINoInput(){
    document.getElementById('dirCenter').firstChild.nodeValue = heading+'°';
    document.getElementById('nowAr').textContent = arrowFor(heading);
    document.getElementById('nowDeg').textContent = heading+'°';
    drawDial();
  }
  function rotateBy(d){
    const step=Math.max(1, parseFloat(document.getElementById('snapStep').value)||15);
    setHeading(heading + d*step);
  }
  document.getElementById('rotL').addEventListener('click', ()=> rotateBy(1));   // CCW
  document.getElementById('rotR').addEventListener('click', ()=> rotateBy(-1));  // CW

  /* ---------- length blocks ---------- */
  const chipsEl = document.getElementById('chips');
  PRESETS.forEach(v=>{
    const c=document.createElement('div'); c.className='chip'; c.textContent=v+'cm';
    c.addEventListener('click', ()=> addLength(v));
    chipsEl.appendChild(c);
  });
  document.getElementById('addCustom').addEventListener('click', ()=>{
    const v=parseFloat(document.getElementById('customLen').value);
    if(v>0) addLength(v);
  });
  document.getElementById('customLen').addEventListener('keydown', e=>{
    if(e.key==='Enter'){ const v=parseFloat(e.target.value); if(v>0) addLength(v); }
  });

  function addLength(l){
    if(closed) closed=false;     // adding reopens the path
    unit=l;
    ops.push({a:heading, l:l});
    render();
  }

  /* ---------- actions ---------- */
  function undo(){ if(closed){closed=false;} else if(ops.length) ops.pop(); render(); }
  function clearAll(){ if(ops.length && !confirm('패턴을 모두 지울까요?')) return; ops=[]; closed=false; render(); }
  function toggleClose(){ if(ops.length<2) return; closed=!closed; render(); }
  document.getElementById('btnUndo').addEventListener('click', undo);
  document.getElementById('btnClear').addEventListener('click', clearAll);
  document.getElementById('btnClose').addEventListener('click', toggleClose);

  /* ---------- rendering ---------- */
  const canvas = document.getElementById('canvas');
  canvas.setAttribute('viewBox', `0 0 ${VBW} ${VBH}`);

  function niceStep(x){
    const steps=[0.1,0.2,0.5,1,2,5,10,20,50,100,200,500];
    for(const s of steps) if(s>=x) return s;
    return 1000;
  }

  function render(){
    const pts = points();
    // bounding box (include origin)
    let minX=0,maxX=0,minY=0,maxY=0;
    for(const p of pts){ minX=Math.min(minX,p.x); maxX=Math.max(maxX,p.x); minY=Math.min(minY,p.y); maxY=Math.max(maxY,p.y); }
    let bw=maxX-minX, bh=maxY-minY;
    if(bw<8 && bh<8){ // default comfortable view
      const ex=4; minX-=ex; maxX+=ex; minY-=ex; maxY+=ex; bw=maxX-minX; bh=maxY-minY;
    } else { const mx=Math.max(bw,bh)*0.12; minX-=mx; maxX+=mx; minY-=mx; maxY+=mx; bw=maxX-minX; bh=maxY-minY; }

    const scale = Math.min((VBW-2*PAD)/bw, (VBH-2*PAD)/bh);
    const offX = (VBW - bw*scale)/2 - minX*scale;
    const offY = (VBH - bh*scale)/2 - minY*scale;
    const X = x => offX + x*scale;
    const Y = y => offY + y*scale;

    let g='';
    // ----- grid -----
    const extent=Math.max(bw,bh);
    const major=niceStep(extent/7), minor=major/5;
    const gx0=Math.floor(minX/minor)*minor, gx1=Math.ceil(maxX/minor)*minor;
    const gy0=Math.floor(minY/minor)*minor, gy1=Math.ceil(maxY/minor)*minor;
    for(let gx=gx0; gx<=gx1+1e-6; gx+=minor){
      const isMaj=Math.abs(gx/major-Math.round(gx/major))<1e-6;
      g+=`<line x1="${X(gx).toFixed(1)}" y1="0" x2="${X(gx).toFixed(1)}" y2="${VBH}" stroke="${isMaj?'#dfe3ee':'#eef0f6'}" stroke-width="${isMaj?1.2:0.8}"/>`;
    }
    for(let gy=gy0; gy<=gy1+1e-6; gy+=minor){
      const isMaj=Math.abs(gy/major-Math.round(gy/major))<1e-6;
      g+=`<line x1="0" y1="${Y(gy).toFixed(1)}" x2="${VBW}" y2="${Y(gy).toFixed(1)}" stroke="${isMaj?'#dfe3ee':'#eef0f6'}" stroke-width="${isMaj?1.2:0.8}"/>`;
    }
    // axes through origin
    g+=`<line x1="${X(0).toFixed(1)}" y1="0" x2="${X(0).toFixed(1)}" y2="${VBH}" stroke="#c7cde0" stroke-width="1.4"/>`;
    g+=`<line x1="0" y1="${Y(0).toFixed(1)}" x2="${VBW}" y2="${Y(0).toFixed(1)}" stroke="#c7cde0" stroke-width="1.4"/>`;

    // ----- path -----
    if(pts.length>1){
      let d='M '+X(pts[0].x).toFixed(1)+' '+Y(pts[0].y).toFixed(1);
      for(let i=1;i<pts.length;i++) d+=' L '+X(pts[i].x).toFixed(1)+' '+Y(pts[i].y).toFixed(1);
      if(closed) d+=' Z';
      if(closed) g+=`<path d="${d}" fill="rgba(79,70,229,.08)" stroke="none"/>`;
      g+=`<path d="${d}" fill="none" stroke="#4f46e5" stroke-width="3.2" stroke-linejoin="round" stroke-linecap="round"/>`;
    }

    // ----- measurement labels (per merged stroke) -----
    const st=strokes();
    let idx=0;
    for(const s of st){
      const p0=pts[s.start], p1=pts[s.start+s.count];
      const mx=(X(p0.x)+X(p1.x))/2, my=(Y(p0.y)+Y(p1.y))/2;
      // perpendicular offset
      const ang=rad(s.a); const ox=Math.sin(ang)*16, oy=Math.sin(ang)*0 - Math.cos(ang)*16;
      const tx=mx+Math.sin(ang)*16, ty=my+Math.cos(ang)*16; // offset perpendicular (screen)
      g+=`<g><rect x="${(tx-20).toFixed(1)}" y="${(ty-11).toFixed(1)}" width="40" height="20" rx="6" fill="#fff" stroke="#e5e8f0" stroke-width="1" opacity=".92"/>`+
         `<text x="${tx.toFixed(1)}" y="${(ty+4).toFixed(1)}" font-size="13" font-weight="700" fill="#3b34b8" text-anchor="middle" font-family="Pretendard">${fmt(s.l)}</text></g>`;
      idx++;
    }

    // ----- start & current markers -----
    const start=pts[0], cur=pts[pts.length-1];
    g+=`<circle cx="${X(start.x).toFixed(1)}" cy="${Y(start.y).toFixed(1)}" r="7" fill="#10b981" stroke="#fff" stroke-width="2.5"/>`;
    g+=`<text x="${X(start.x).toFixed(1)}" y="${(Y(start.y)-13).toFixed(1)}" font-size="12" font-weight="700" fill="#0e8f63" text-anchor="middle" font-family="Pretendard">시작</text>`;
    if(pts.length>1 && !closed){
      g+=`<circle cx="${X(cur.x).toFixed(1)}" cy="${Y(cur.y).toFixed(1)}" r="7" fill="#4f46e5" stroke="#fff" stroke-width="2.5"/>`;
      // heading arrow preview
      const al=Math.min(extent*0.18, 4)*scale; // preview length
      const hx=X(cur.x)+Math.cos(rad(heading))*al, hy=Y(cur.y)-Math.sin(rad(heading))*al;
      g+=`<line x1="${X(cur.x).toFixed(1)}" y1="${Y(cur.y).toFixed(1)}" x2="${hx.toFixed(1)}" y2="${hy.toFixed(1)}" stroke="#f59e0b" stroke-width="2.4" stroke-dasharray="5 4" stroke-linecap="round"/>`;
      const aa=rad(heading);
      const a1=aa+Math.PI*0.82, a2=aa-Math.PI*0.82, hl=9;
      g+=`<path d="M ${hx.toFixed(1)} ${hy.toFixed(1)} L ${(hx+Math.cos(a1)*hl).toFixed(1)} ${(hy-Math.sin(a1)*hl).toFixed(1)} M ${hx.toFixed(1)} ${hy.toFixed(1)} L ${(hx+Math.cos(a2)*hl).toFixed(1)} ${(hy-Math.sin(a2)*hl).toFixed(1)}" stroke="#f59e0b" stroke-width="2.4" stroke-linecap="round"/>`;
    }

    canvas.innerHTML=g;
    updateStats(pts, st, bw, bh);
    renderBlocks(st);
  }

  function updateStats(pts, st, bw, bh){
    let total=0; for(const o of ops) total+=o.l;
    if(closed && pts.length>1){ const a=pts[0],b=pts[pts.length-1]; total+=Math.hypot(a.x-b.x,a.y-b.y); }
    const cur=pts[pts.length-1];
    document.getElementById('stTotal').innerHTML = fmt(total)+' <small>cm</small>';
    document.getElementById('stSeg').innerHTML = st.length+' <small>개</small>';
    document.getElementById('stPos').innerHTML = fmt(cur.x)+', '+fmt(-cur.y)+' <small>cm</small>';
    // actual drawn bbox (without padding): recompute
    let nx=0,xx=0,ny=0,xy=0; for(const p of pts){nx=Math.min(nx,p.x);xx=Math.max(xx,p.x);ny=Math.min(ny,p.y);xy=Math.max(xy,p.y);}
    document.getElementById('stBox').innerHTML = fmt(xx-nx)+' × '+fmt(xy-ny)+' <small>cm</small>';
    const cl=document.getElementById('stClosed');
    cl.textContent = closed?'닫힘':'열림'; cl.style.color = closed?'#10b981':'var(--ink)';
    document.getElementById('closeLbl').textContent = closed?'열기':'닫기';
    document.getElementById('blkHint').textContent = st.length+'개';
  }

  function renderBlocks(st){
    const el=document.getElementById('blocks');
    if(!st.length){ el.innerHTML='<div class="blk-empty">아직 블록이 없어요.<br>방향을 정하고 길이를 눌러보세요.</div>'; return; }
    let h='';
    st.forEach((s,i)=>{
      h+=`<div class="blk"><span class="bn">${i+1}</span><span class="ar">${arrowFor(s.a)}</span>`+
         `<span class="ln">${fmt(s.l)}cm</span><span class="dg">${fmt(s.a)}°</span>`+
         `<span class="x" data-start="${s.start}" data-count="${s.count}" title="이 블록 삭제">✕</span></div>`;
    });
    if(closed) h+=`<div class="blk closing"><span class="bn" style="background:#e6f6ef;color:#0e8f63">↩</span><span class="ar" style="color:#10b981">⤴</span><span class="ln">닫기</span><span class="dg">시작점 연결</span></div>`;
    el.innerHTML=h;
    el.querySelectorAll('.x').forEach(x=>x.addEventListener('click', ()=>{
      ops.splice(parseInt(x.dataset.start), parseInt(x.dataset.count)); render();
    }));
  }

  /* ---------- keyboard ---------- */
  document.addEventListener('keydown', e=>{
    const t=e.target.tagName; if(t==='INPUT'||t==='SELECT'||t==='TEXTAREA') return;
    if(e.key==='ArrowUp'){ setHeading(90); e.preventDefault(); }
    else if(e.key==='ArrowDown'){ setHeading(270); e.preventDefault(); }
    else if(e.key==='ArrowLeft'){ setHeading(180); e.preventDefault(); }
    else if(e.key==='ArrowRight'){ setHeading(0); e.preventDefault(); }
    else if(e.key==='Enter'||e.key===' '){ addLength(unit); e.preventDefault(); }
    else if(e.key==='Backspace'){ undo(); e.preventDefault(); }
    else if(e.key==='+'||e.key==='='){ rotateBy(1); }
    else if(e.key==='-'){ rotateBy(-1); }
  });

  /* ---------- export ---------- */
  function exportSVG(){
    const clone=canvas.cloneNode(true);
    clone.setAttribute('xmlns','http://www.w3.org/2000/svg');
    clone.setAttribute('width',VBW); clone.setAttribute('height',VBH);
    clone.insertAdjacentHTML('afterbegin', `<rect x="0" y="0" width="${VBW}" height="${VBH}" fill="#ffffff"/>`);
    return '<?xml version="1.0" encoding="UTF-8"?>\n'+new XMLSerializer().serializeToString(clone);
  }
  function download(name, blob){
    const url=URL.createObjectURL(blob), a=document.createElement('a');
    a.href=url; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(url),1000);
  }
  document.getElementById('btnSvg').addEventListener('click', ()=>{
    download('moida-pattern.svg', new Blob([exportSVG()], {type:'image/svg+xml'}));
  });
  document.getElementById('btnPng').addEventListener('click', ()=>{
    const svg=exportSVG(), img=new Image();
    img.onload=()=>{
      const sc=2, c=document.createElement('canvas'); c.width=VBW*sc; c.height=VBH*sc;
      const ctx=c.getContext('2d'); ctx.scale(sc,sc); ctx.drawImage(img,0,0);
      c.toBlob(b=> download('moida-pattern.png', b), 'image/png');
    };
    img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
  });

  /* ---------- save / load (localStorage) ---------- */
  function getSaved(){ try{ return JSON.parse(localStorage.getItem(SAVE_KEY)||'[]'); }catch(e){ return []; } }
  function setSaved(a){ localStorage.setItem(SAVE_KEY, JSON.stringify(a)); }
  function refreshSaveList(){
    const list=getSaved(), sel=document.getElementById('saveList');
    sel.innerHTML='<option value="">저장된 패턴…</option>'+list.map((p,i)=>`<option value="${i}">${p.name}</option>`).join('');
  }
  document.getElementById('btnSave').addEventListener('click', ()=>{
    if(!ops.length){ alert('저장할 블록이 없어요.'); return; }
    const name=prompt('패턴 이름을 입력하세요', '패턴 '+(getSaved().length+1));
    if(!name) return;
    const list=getSaved(); list.push({name, ops:JSON.parse(JSON.stringify(ops)), closed});
    setSaved(list); refreshSaveList(); alert('저장했어요.');
  });
  document.getElementById('btnLoad').addEventListener('click', ()=>{
    const v=document.getElementById('saveList').value; if(v==='') return;
    const p=getSaved()[parseInt(v)]; if(!p) return;
    ops=JSON.parse(JSON.stringify(p.ops)); closed=!!p.closed; render();
  });
  document.getElementById('btnDelSave').addEventListener('click', ()=>{
    const v=document.getElementById('saveList').value; if(v==='') return;
    const list=getSaved(); list.splice(parseInt(v),1); setSaved(list); refreshSaveList();
  });

  /* ---------- sidebar collapse ---------- */
  const app=document.querySelector('.app'), CK='moida_sidebar_collapsed';
  if(localStorage.getItem(CK)==='1') app.classList.add('collapsed');
  document.querySelectorAll('[data-collapse]').forEach(b=>b.addEventListener('click',()=>{
    app.classList.toggle('collapsed');
    localStorage.setItem(CK, app.classList.contains('collapsed')?'1':'0');
  }));

  /* ---------- init ---------- */
  syncHeadingUI();
  refreshSaveList();
  render();
})();
</script>
</body>
</html>
