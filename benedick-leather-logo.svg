<svg width="240" height="64" viewBox="0 0 240 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="베네딕 가죽공예 로고">
  <defs>
    <linearGradient id="badge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#322b21"/>
      <stop offset="1" stop-color="#1c1813"/>
    </linearGradient>
    <linearGradient id="goldStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e7c878"/>
      <stop offset="1" stop-color="#bd9a52"/>
    </linearGradient>
  </defs>

  <!-- badge -->
  <rect x="2" y="6" width="52" height="52" rx="15" fill="url(#badge)"
        stroke="#bd9a52" stroke-opacity="0.5" stroke-width="1"/>

  <!-- 바늘 + 실 (needle & thread) -->
  <g stroke="url(#goldStroke)" stroke-width="2.4" stroke-linecap="round" fill="none">
    <!-- needle -->
    <line x1="18" y1="44" x2="38" y2="20"/>
    <!-- needle eye -->
    <circle cx="35.6" cy="22.9" r="2.1" stroke-width="1.8"/>
    <!-- thread looping through -->
    <path d="M35.6 22.9 C 30 26, 26 21, 22 25 S 16 33, 12 30" stroke-width="1.7"/>
  </g>
  <!-- saddle stitches -->
  <g stroke="#d9b463" stroke-width="2.2" stroke-linecap="round">
    <path d="M40 46 L45 39"/><path d="M44 49 L49 42"/>
  </g>

  <!-- wordmark -->
  <text x="68" y="30" font-family="'Cormorant Garamond','Playfair Display',serif"
        font-size="23" font-weight="700" fill="#2b2620">베네딕</text>
  <text x="68" y="48" font-family="Pretendard,-apple-system,sans-serif"
        font-size="9.5" font-weight="600" letter-spacing="3" fill="#9c7c41">LEATHER CRAFT TOOLS</text>
</svg>
